services:
  postgres:
    image: postgres:15-alpine
    container_name: vkscope_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vkscope
      POSTGRES_PASSWORD: vkscope_secret
      POSTGRES_DB: vkscope
    ports:
      - "5432:5432"
    volumes:
      - vkscope_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vkscope -d vkscope"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vkscope_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - vkscope_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  vkscope_pg_data:
  vkscope_redis_data:
